name: Render and Upload Horror Video

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Horror story topic (leave blank for daily auto-selection)'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-24.04
    timeout-minutes: 90       # Kokoro on CPU can take ~30-40 min total

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
      FREESOUND_API_KEY:     ${{ secrets.FREESOUND_API_KEY }}
      HUGGINGFACE_TOKEN:     ${{ secrets.HUGGINGFACE_TOKEN }}
      YOUTUBE_TOKEN_JSON:    ${{ secrets.YOUTUBE_TOKEN_JSON }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_TOKEN_PICKLE_BASE64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── System Deps ─────────────────────────────────────────────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          # Chromium / Playwright deps
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libasound2t64 \
            libxrandr2 libxkbcommon-dev libxfixes3 libxcomposite1 \
            libxdamage1 libgbm-dev libcups2 libcairo2 \
            libpango-1.0-0 libatk-bridge2.0-0
          # espeak-ng — required by Kokoro TTS for phoneme fallback
          sudo apt-get install -y espeak-ng
          # libsndfile — required by soundfile / sf.write
          sudo apt-get install -y libsndfile1

      # ── Playwright ──────────────────────────────────────────────────────────
      - name: Install Playwright
        run: |
          npx playwright install-deps
          npx playwright install chromium

      # ── HuggingFace model cache ─────────────────────────────────────────────
      - name: Cache HuggingFace Models (Kokoro weights)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-kokoro-v1
          restore-keys: |
            hf-models-kokoro-

      # ── Python deps ─────────────────────────────────────────────────────────
      - name: Install Python Dependencies
        run: |
          # Install CPU-only PyTorch first (avoids pulling in 2 GB CUDA wheels)
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Install everything else
          pip install -r scripts/requirements.txt

      # ── Remotion deps ───────────────────────────────────────────────────────
      - name: Install Remotion Dependencies
        run: |
          cd remotion-video
          npm install

      # ── Pipeline ────────────────────────────────────────────────────────────
      - name: Run Automation Pipeline
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -z "$TOPIC" ]; then
            python -m scripts.orchestrator --render --upload
          else
            python -m scripts.orchestrator --topic "$TOPIC" --render --upload
          fi

      # ── Artifact upload (for debugging) ─────────────────────────────────────
      - name: Upload Rendered Video as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horror-video-${{ github.run_number }}
          path: remotion-video/out_part_*.mp4
          retention-days: 3
