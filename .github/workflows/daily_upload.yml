name: Daily Horror Video Upload

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC (Approx. 7-10 PM in the US)
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y libnss3 libdbus-1-3 libatk1.0-0 libasound2t64 libxrandr2 libxkbcommon-dev libxfixes3 libxcomposite1 libxdamage1 libgbm-dev libcups2 libcairo2 libpango-1.0-0 libatk-bridge2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Install Node Dependencies
      run: |
        cd remotion-video
        rm -rf node_modules package-lock.json
        npm install --include=optional

    - name: Install Chrome
      run: |
        cd remotion-video
        npx remotion browser install

    - name: Run Orchestrator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_TOKEN_PICKLE_BASE64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}
      run: |
        python -m scripts.orchestrator --render --upload

    - name: Commit and Push Topic History
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update daily horror topic history [skip ci]"
        file_pattern: 'assets/used_topics.txt'
